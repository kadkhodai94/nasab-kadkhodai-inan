name: NasabNama Android Release v2.1

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project zip if exists
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 2 -type f -name '*.zip' | head -n 1 || true)
          if [ -n "$ZIP_FILE" ]; then
            echo "Found zip: $ZIP_FILE"
            rm -rf extracted_project
            mkdir -p extracted_project
            unzip -o "$ZIP_FILE" -d extracted_project
            if [ -f extracted_project/pubspec.yaml ]; then
              rsync -a extracted_project/ ./
            else
              INNER=$(find extracted_project -name pubspec.yaml | head -n 1 | xargs dirname || true)
              if [ -n "$INNER" ]; then
                rsync -a "$INNER"/ ./
              fi
            fi
            rm -rf extracted_project
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Create Android shell if needed
        shell: bash
        run: |
          set -e
          if [ ! -d android ]; then
            flutter create --platforms=android --org com.nasabnama --project-name nasab_kadkhodai_inan .
          fi
          rm -f test/widget_test.dart

      - name: Force Android compileSdk 36
        shell: bash
        run: |
          set -e
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/compileSdk = [0-9][0-9]*/compileSdk = 36/g' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdkVersion [0-9][0-9]*/compileSdkVersion 36/g' android/app/build.gradle
          fi

      - name: Install Android SDK 36
        shell: bash
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release --no-shrink --build-name=2.1.0 --build-number=5

      - name: Build AAB
        run: flutter build appbundle --release --no-shrink --build-name=2.1.0 --build-number=5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nasabnama-v2-1-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: nasabnama-v2-1-aab
          path: build/app/outputs/bundle/release/app-release.aab
