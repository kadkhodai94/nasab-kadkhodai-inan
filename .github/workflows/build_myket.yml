name: NasabNama Auto ZIP Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: nasabnama-auto-zip-build
  cancel-in-progress: true

env:
  PROJECT_NAME: nasab_kadkhodai_inan
  ORG_ID: com.nasabnama
  FLUTTER_VERSION: "3.32.8"
  JAVA_VERSION: "17"
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"

jobs:
  build:
    name: Build APK and AAB from Latest ZIP
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract latest project ZIP
        shell: bash
        run: |
          set -euo pipefail

          echo "Searching for ZIP files..."

          mapfile -t ZIP_FILES < <(
            find . -maxdepth 2 -type f -name "*.zip" \
              ! -path "./app/*" \
              ! -path "./extracted_project/*" \
              | sort -V
          )

          if [ "${#ZIP_FILES[@]}" -eq 0 ]; then
            echo "ERROR: No ZIP file found in repository."
            echo "Upload your latest project ZIP to the repository root."
            exit 1
          fi

          ZIP_FILE="${ZIP_FILES[$((${#ZIP_FILES[@]}-1))]}"

          echo "Selected ZIP:"
          echo "$ZIP_FILE"

          rm -rf app extracted_project
          mkdir -p app extracted_project

          unzip -q -o "$ZIP_FILE" -d extracted_project

          PUBSPEC_PATH="$(find extracted_project -name pubspec.yaml | head -n 1 || true)"

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "ERROR: pubspec.yaml not found inside ZIP."
            exit 1
          fi

          PROJECT_ROOT="$(dirname "$PUBSPEC_PATH")"

          echo "Flutter project found at:"
          echo "$PROJECT_ROOT"

          rsync -a "$PROJECT_ROOT"/ app/

          echo "PROJECT_DIR=app" >> "$GITHUB_ENV"
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"

      - name: Fix pubspec package name and read version
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          echo "Forcing valid Dart package name..."
          sed -i "s/^name:.*/name: ${PROJECT_NAME}/g" pubspec.yaml

          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}' || true)"

          if [ -z "$VERSION_LINE" ]; then
            echo "No version found in pubspec.yaml. Using default 1.0.0+1"
            VERSION_LINE="1.0.0+1"
            echo "version: $VERSION_LINE" >> pubspec.yaml
          fi

          BUILD_NAME="${VERSION_LINE%%+*}"
          BUILD_NUMBER="${VERSION_LINE##*+}"

          if [ "$BUILD_NAME" = "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="1"
          fi

          echo "Detected version:"
          echo "BUILD_NAME=$BUILD_NAME"
          echo "BUILD_NUMBER=$BUILD_NUMBER"

          echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

          echo "Current pubspec:"
          grep -E "^(name|version):" pubspec.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail

          SDKMANAGER="$(command -v sdkmanager || true)"

          if [ -z "$SDKMANAGER" ]; then
            if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
              SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
            elif [ -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
              SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            else
              echo "ERROR: sdkmanager not found."
              find "$ANDROID_HOME" -name sdkmanager || true
              exit 1
            fi
          fi

          echo "Using sdkmanager:"
          echo "$SDKMANAGER"

          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        shell: bash
        run: |
          flutter config --no-analytics
          flutter --version

      - name: Create Android project shell if needed
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ ! -d android ]; then
            echo "Android folder not found. Creating Android shell..."
            flutter create \
              --platforms=android \
              --org "$ORG_ID" \
              --project-name "$PROJECT_NAME" \
              .
          else
            echo "Android folder already exists."
          fi

          rm -f test/widget_test.dart

      - name: Force Android compileSdk
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ -f android/app/build.gradle.kts ]; then
            perl -0pi -e "s/compileSdk\s*=\s*(flutter\.compileSdkVersion|\d+)/compileSdk = ${ANDROID_COMPILE_SDK}/g" android/app/build.gradle.kts
            grep -n "compileSdk" android/app/build.gradle.kts || true
          fi

          if [ -f android/app/build.gradle ]; then
            perl -0pi -e "s/compileSdkVersion\s+(flutter\.compileSdkVersion|\d+)/compileSdkVersion ${ANDROID_COMPILE_SDK}/g" android/app/build.gradle
            perl -0pi -e "s/compileSdk\s*=\s*(flutter\.compileSdkVersion|\d+)/compileSdk = ${ANDROID_COMPILE_SDK}/g" android/app/build.gradle
            grep -n "compileSdk" android/app/build.gradle || true
          fi

      - name: Clean Flutter and Gradle state
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          flutter clean
          rm -rf .dart_tool
          rm -rf build
          rm -rf android/.gradle
          rm -rf android/app/build

      - name: Get Flutter packages
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"
          flutter pub get

      - name: Analyze Dart code
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          echo "Building APK:"
          echo "Version name: $BUILD_NAME"
          echo "Version code: $BUILD_NUMBER"

          flutter build apk \
            --release \
            --no-shrink \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER"

      - name: Build release AAB
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          echo "Building AAB:"
          echo "Version name: $BUILD_NAME"
          echo "Version code: $BUILD_NUMBER"

          flutter build appbundle \
            --release \
            --no-shrink \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasabnama-auto-v${{ env.BUILD_NAME }}-${{ env.BUILD_NUMBER }}-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasabnama-auto-v${{ env.BUILD_NAME }}-${{ env.BUILD_NUMBER }}-aab
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
