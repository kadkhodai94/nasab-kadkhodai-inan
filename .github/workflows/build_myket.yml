name: NasabNama Android Release

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project zip if exists
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 2 -type f -name '*.zip' | head -n 1 || true)
          if [ -n "$ZIP_FILE" ]; then
            echo "Found zip: $ZIP_FILE"
            mkdir -p extracted_project
            unzip -o "$ZIP_FILE" -d extracted_project
            if [ -f extracted_project/pubspec.yaml ]; then
              rsync -a extracted_project/ ./
            else
              INNER=$(find extracted_project -name pubspec.yaml | head -n 1 | xargs dirname)
              if [ -n "$INNER" ]; then
                rsync -a "$INNER"/ ./
              fi
            fi
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Create Android shell if needed
        shell: bash
        run: |
          set -e
          if [ ! -d android ]; then
            flutter create --platforms=android --org com.nasabnama --project-name nasab_kadkhodai_inan .
          fi

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release --build-name=1.0.0 --build-number=1

      - name: Build AAB
        run: flutter build appbundle --release --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nasabnama-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: nasabnama-aab
          path: build/app/outputs/bundle/release/app-release.aab
