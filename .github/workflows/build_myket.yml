name: NasabNama Safe ZIP Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: nasabnama-safe-zip-build
  cancel-in-progress: true

env:
  PROJECT_NAME: nasab_kadkhodai_inan
  ORG_ID: mk.kadkhodai
  ANDROID_PACKAGE_NAME: mk.kadkhodai.nasab
  FLUTTER_VERSION: "3.32.8"
  JAVA_VERSION: "17"
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  BAZAAR_PUBLIC_KEY: ${{ secrets.BAZAAR_PUBLIC_KEY }}

jobs:
  build:
    name: Build NasabNama APK and AAB
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract latest NasabNama ZIP only
        shell: bash
        run: |
          set -euo pipefail
          echo "Searching only for NasabNama ZIP files..."
          mapfile -t ZIP_FILES < <(
            find . -maxdepth 2 -type f \( \
              -name "nasabnama_flutter_*.zip" -o \
              -name "nasab_*.zip" \
            \) \
              ! -path "./app/*" \
              ! -path "./extracted_project/*" \
              | sort -V
          )

          if [ "${#ZIP_FILES[@]}" -eq 0 ]; then
            echo "ERROR: No NasabNama ZIP found."
            echo "Put only the latest nasabnama_flutter_*.zip in repository root."
            exit 1
          fi

          ZIP_FILE="${ZIP_FILES[$((${#ZIP_FILES[@]}-1))]}"
          echo "Selected NasabNama ZIP: $ZIP_FILE"

          rm -rf app extracted_project
          mkdir -p app extracted_project
          unzip -q -o "$ZIP_FILE" -d extracted_project

          PUBSPEC_PATH="$(find extracted_project -name pubspec.yaml | head -n 1 || true)"
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "ERROR: pubspec.yaml not found inside ZIP."
            exit 1
          fi

          PROJECT_ROOT="$(dirname "$PUBSPEC_PATH")"
          echo "Flutter project found at: $PROJECT_ROOT"

          if grep -qiE "kids|learning|alphabet|کودک|حروف فارسی|قهرمان کوچولو" "$PROJECT_ROOT/pubspec.yaml" 2>/dev/null; then
            echo "ERROR: This ZIP looks like another project, not NasabNama."
            exit 1
          fi

          if [ -f "$PROJECT_ROOT/lib/main.dart" ] && grep -qiE "قهرمان کوچولو|حروف فارسی|KidsLearning|kids_learning" "$PROJECT_ROOT/lib/main.dart"; then
            echo "ERROR: Wrong project detected in lib/main.dart. Build stopped."
            exit 1
          fi

          rsync -a "$PROJECT_ROOT"/ app/
          echo "PROJECT_DIR=app" >> "$GITHUB_ENV"
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"

      - name: Fix pubspec package name and read version
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          sed -i "s/^name:.*/name: ${PROJECT_NAME}/g" pubspec.yaml
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}' || true)"
          if [ -z "$VERSION_LINE" ]; then
            VERSION_LINE="1.0.0+1"
            echo "version: $VERSION_LINE" >> pubspec.yaml
          fi
          BUILD_NAME="${VERSION_LINE%%+*}"
          BUILD_NUMBER="${VERSION_LINE##*+}"
          if [ "$BUILD_NAME" = "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="1"
          fi
          echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          grep -E "^(name|version):" pubspec.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
              SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
            elif [ -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
              SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            else
              echo "ERROR: sdkmanager not found."
              find "$ANDROID_HOME" -name sdkmanager || true
              exit 1
            fi
          fi
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        shell: bash
        run: |
          flutter config --no-analytics
          flutter --version

      - name: Create Android project shell if needed
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          if [ ! -d android ]; then
            flutter create --platforms=android --org "$ORG_ID" --project-name "$PROJECT_NAME" .
          fi
          rm -f test/widget_test.dart

      - name: Force package name and release signing
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          echo "Forcing Android package: $ANDROID_PACKAGE_NAME"

          PKG_PATH="${ANDROID_PACKAGE_NAME//./\/}"
          mkdir -p "android/app/src/main/kotlin/$PKG_PATH"
          find android/app/src/main/kotlin -name "MainActivity.kt" -delete 2>/dev/null || true

          cat > "android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt" <<KOTLIN
          package $ANDROID_PACKAGE_NAME

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity()
          KOTLIN

          mkdir -p android/app
          cp -f android_signing/key.properties android/key.properties
          cp -f android_signing/*.jks android/app/

      - name: Force launcher icons
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/values

          cp -f android_launcher_icons/mipmap-mdpi/*.png android/app/src/main/res/mipmap-mdpi/
          cp -f android_launcher_icons/mipmap-hdpi/*.png android/app/src/main/res/mipmap-hdpi/
          cp -f android_launcher_icons/mipmap-xhdpi/*.png android/app/src/main/res/mipmap-xhdpi/
          cp -f android_launcher_icons/mipmap-xxhdpi/*.png android/app/src/main/res/mipmap-xxhdpi/
          cp -f android_launcher_icons/mipmap-xxxhdpi/*.png android/app/src/main/res/mipmap-xxxhdpi/
          cp -f android_launcher_icons/mipmap-anydpi-v26/*.xml android/app/src/main/res/mipmap-anydpi-v26/
          cp -f android_launcher_icons/values/*.xml android/app/src/main/res/values/

      - name: Force Android compileSdk
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          if [ -f android/app/build.gradle.kts ]; then
            perl -0pi -e "s/compileSdk\s*=\s*(flutter\.compileSdkVersion|\d+)/compileSdk = ${ANDROID_COMPILE_SDK}/g" android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            perl -0pi -e "s/compileSdkVersion\s+(flutter\.compileSdkVersion|\d+)/compileSdkVersion ${ANDROID_COMPILE_SDK}/g" android/app/build.gradle
            perl -0pi -e "s/compileSdk\s*=\s*(flutter\.compileSdkVersion|\d+)/compileSdk = ${ANDROID_COMPILE_SDK}/g" android/app/build.gradle
          fi

      - name: Clean Flutter and Gradle state
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          flutter clean
          rm -rf .dart_tool build android/.gradle android/app/build

      - name: Get Flutter packages
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Analyze Dart code
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          flutter build apk --release --no-shrink --dart-define=BAZAAR_PUBLIC_KEY="$BAZAAR_PUBLIC_KEY" --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

      - name: Build release AAB
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          flutter build appbundle --release --no-shrink --dart-define=BAZAAR_PUBLIC_KEY="$BAZAAR_PUBLIC_KEY" --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasabnama-v${{ env.BUILD_NAME }}-${{ env.BUILD_NUMBER }}-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasabnama-v${{ env.BUILD_NAME }}-${{ env.BUILD_NUMBER }}-aab
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
