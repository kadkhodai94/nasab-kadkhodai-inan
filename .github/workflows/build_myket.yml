name: Build Promptino APK v10

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find ZIP and extract Flutter project
        run: |
          set -e
          rm -rf extracted app

          ZIP_FILE=$(find . -maxdepth 3 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found."
            exit 1
          fi

          echo "ZIP: $ZIP_FILE"

          mkdir extracted app
          unzip -q "$ZIP_FILE" -d extracted

          PROJECT_DIR=$(find extracted -name "pubspec.yaml" -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "No Flutter project found inside ZIP."
            exit 1
          fi

          echo "PROJECT_DIR: $PROJECT_DIR"
          cp -R "$PROJECT_DIR"/. app/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          java -version

      - name: Create Android scaffold safely
        working-directory: app
        run: |
          set -e
          cp -f pubspec.yaml /tmp/pubspec.yaml
          cp -f lib/main.dart /tmp/main.dart

          flutter create --platforms=android --overwrite .

          cp -f /tmp/pubspec.yaml pubspec.yaml
          cp -f /tmp/main.dart lib/main.dart

      - name: Patch Android config for Adivery and R8
        working-directory: app
        run: |
          set -e

          cat > android/app/proguard-rules.pro <<'EOF'
          -dontwarn com.mbridge.**
          -dontwarn com.mbridge.msdk.**
          -dontwarn com.mbridge.msdk.nativex.view.**
          -dontwarn com.mbridge.msdk.video.bt.module.orglistener.**
          -keep class com.adivery.** { *; }
          -keep class com.mbridge.** { *; }
          EOF

          python3 - <<'PY'
          from pathlib import Path
          import re

          for p in [Path("android/app/build.gradle"), Path("android/app/build.gradle.kts")]:
              if not p.exists():
                  continue

              s = p.read_text()

              s = re.sub(r"compileSdkVersion\s+flutter\.compileSdkVersion", "compileSdkVersion 36", s)
              s = re.sub(r"compileSdkVersion\s+\d+", "compileSdkVersion 36", s)
              s = re.sub(r"targetSdkVersion\s+flutter\.targetSdkVersion", "targetSdkVersion 36", s)
              s = re.sub(r"targetSdkVersion\s+\d+", "targetSdkVersion 36", s)
              s = re.sub(r"minSdkVersion\s+flutter\.minSdkVersion", "minSdkVersion 23", s)

              s = re.sub(r"compileSdk\s*=\s*flutter\.compileSdkVersion", "compileSdk = 36", s)
              s = re.sub(r"compileSdk\s*=\s*\d+", "compileSdk = 36", s)
              s = re.sub(r"targetSdk\s*=\s*flutter\.targetSdkVersion", "targetSdk = 36", s)
              s = re.sub(r"targetSdk\s*=\s*\d+", "targetSdk = 36", s)
              s = re.sub(r"minSdk\s*=\s*flutter\.minSdkVersion", "minSdk = 23", s)

              s = s.replace("minifyEnabled true", "minifyEnabled false")
              s = s.replace("shrinkResources true", "shrinkResources false")
              s = s.replace("isMinifyEnabled = true", "isMinifyEnabled = false")
              s = s.replace("isShrinkResources = true", "isShrinkResources = false")

              if p.suffix == ".gradle":
                  if "release {" in s and "minifyEnabled false" not in s:
                      s = s.replace(
                          "release {",
                          "release {\n            minifyEnabled false\n            shrinkResources false\n            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'",
                          1
                      )

              if p.suffix == ".kts":
                  if "release {" in s and "isMinifyEnabled = false" not in s:
                      s = s.replace(
                          "release {",
                          "release {\n            isMinifyEnabled = false\n            isShrinkResources = false\n            proguardFiles(getDefaultProguardFile(\"proguard-android-optimize.txt\"), \"proguard-rules.pro\")",
                          1
                      )

              p.write_text(s)

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          if manifest.exists():
              ms = manifest.read_text()
              if "android.permission.INTERNET" not in ms:
                  idx = ms.find(">")
                  ms = ms[:idx + 1] + '\n    <uses-permission android:name="android.permission.INTERNET"/>' + ms[idx + 1:]
              manifest.write_text(ms)
          PY

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Verify app is not Flutter demo
        working-directory: app
        run: |
          if grep -q "Flutter Demo Home Page" lib/main.dart; then
            echo "Default Flutter demo detected. Stop."
            exit 1
          fi

      - name: Build APK without shrink
        working-directory: app
        run: flutter build apk --release --no-shrink --build-name=1.9.0 --build-number=20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: promptino-v10-rewards-missions-history-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
